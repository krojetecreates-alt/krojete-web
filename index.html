<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Krojete | Feedback</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <h1>KROJETE</h1>
    <p>handmade crochet & cute things 💜</p>
  </header>

  <section class="intro">
    <h2>Welcome</h2>
    <p>
      This is a space for sharing thoughts, feedback, and experiences about Krojete.
      Your messages help us improve ✨
    </p>
  </section>

  <!-- 💬 FEEDBACK SECTION -->
  <section class="feedback">
    <h2>💬 Feedback Wall</h2>
    <p>Leave a message below. It will appear instantly for everyone.</p>

    <div class="comment-box">
      <script src="https://utteranc.es/client.js"
        repo="krojetecreates-alt/krojete-web"
        issue-term="pathname"
        theme="github-dark"
        crossorigin="anonymous"
        async>
</script>
    </div>
  </section>

  <footer>
    <p>© 2026 Krojete • handmade with love</p>
  </footer>

</body>
</html>
